<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — LearnHub</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .login-wrap { min-height: 78vh; display: grid; place-items: center; }
    .login-card {
      width: 100%; max-width: 400px; text-align: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 34px 30px; box-shadow: var(--shadow);
    }
    .login-card .logo {
      width: 54px; height: 54px; margin: 0 auto 18px;
      display: grid; place-items: center; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #071129; font-weight: 900; font-size: 24px; box-shadow: var(--shadow);
    }
    .login-card h1 { font-size: 24px; margin: 0 0 6px; }
    .login-card p { color: var(--muted); margin: 0 0 22px; font-size: 14.5px; }
    .login-card input {
      width: 100%; padding: 14px 16px; font-size: 16px;
      background: var(--bg-2); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); outline: none;
      transition: border-color 0.12s ease;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card .btn { width: 100%; justify-content: center; margin-top: 14px; }
    .err { color: var(--danger); font-size: 14px; min-height: 20px; margin-top: 12px; }
  </style>
</head>
<body>
  <main class="container">
    <div class="login-wrap">
      <form class="login-card" id="login-form" autocomplete="off">
        <div class="logo">L</div>
        <h1>LearnHub</h1>
        <p>Enter the password to continue.</p>
        <input type="password" id="pw" placeholder="Password" autofocus aria-label="Password" />
        <button class="btn primary" type="submit">Unlock →</button>
        <div class="err" id="err"></div>
      </form>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    // If already signed in, skip the login screen.
    if (LH_AUTH.isLoggedIn()) location.replace("index.html");

    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      var pw = document.getElementById("pw").value;
      if (LH_AUTH.login(pw)) {
        location.href = "index.html";
      } else {
        document.getElementById("err").textContent = "Incorrect password — try again.";
        document.getElementById("pw").value = "";
        document.getElementById("pw").focus();
      }
    });
  </script>
</body>
</html>
